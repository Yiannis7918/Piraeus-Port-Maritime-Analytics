version: 2

models:
  - name: stg_ais_codes
    description: "Cleaned lookup of ship type codes and names"
    columns:
      - name: shiptype_code
        description: "Integer code for vessel type"
        tests:
          - not_null
          - unique
      - name: shiptype_name
        description: "Human-readable description of the ship type"
        tests:
          - not_null

  - name: stg_ais_static
    description: "Cleaned vessel registry"
    columns:
      - name: vessel_id
        description: "Anonymized vessel identifier"
        tests:
          - not_null
          - unique
      - name: country
        description: "Vessel's flag country"
      - name: shiptype_code
        description: "Integer code for vessel type, joinable to stg_ais_codes"

  - name: stg_ais_kinematic
    description: "Cleaned AIS position pings"
    columns:
      - name: vessel_id
        description: "Vessel that emitted this position"
        tests:
          - not_null
      - name: event_timestamp
        description: "Timestamp of the AIS ping"
        tests:
          - not_null
      - name: event_date
        description: "Date extracted from event_timestamp"
        tests:
          - not_null
      - name: lat
        description: "Latitude in decimal degrees"
        tests:
          - not_null
      - name: lon
        description: "Longitude in decimal degrees"
        tests:
          - not_null