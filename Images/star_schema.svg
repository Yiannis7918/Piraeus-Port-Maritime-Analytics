<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- dim_date -->
  <rect x="30" y="40" width="200" height="220" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">dim_date</text>
  <text x="130" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">~1,095 rows</text>
  <line x1="40" y1="94" x2="220" y2="94" stroke="#085041" stroke-width="0.5" opacity="0.3"/>
  <text x="42" y="114" font-family="sans-serif" font-size="12" fill="#0F6E56">date_key (PK)</text>
  <text x="42" y="134" font-family="sans-serif" font-size="12" fill="#0F6E56">year, quarter, month</text>
  <text x="42" y="154" font-family="sans-serif" font-size="12" fill="#0F6E56">month_name, week</text>
  <text x="42" y="174" font-family="sans-serif" font-size="12" fill="#0F6E56">day_of_week, day_name</text>
  <text x="42" y="194" font-family="sans-serif" font-size="12" fill="#0F6E56">season</text>
  <text x="42" y="214" font-family="sans-serif" font-size="12" fill="#0F6E56">is_weekend</text>
  <text x="42" y="234" font-family="sans-serif" font-size="12" fill="#0F6E56">is_complete_year</text>
  <text x="42" y="254" font-family="sans-serif" font-size="12" fill="#0F6E56">is_in_dataset</text>

  <!-- dim_shiptype -->
  <rect x="450" y="40" width="200" height="140" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="550" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">dim_shiptype</text>
  <text x="550" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">~65 rows</text>
  <line x1="460" y1="94" x2="640" y2="94" stroke="#085041" stroke-width="0.5" opacity="0.3"/>
  <text x="462" y="114" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_code (PK)</text>
  <text x="462" y="134" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_name</text>
  <text x="462" y="154" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_category</text>

  <!-- dim_vessel -->
  <rect x="30" y="370" width="200" height="160" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="394" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">dim_vessel</text>
  <text x="130" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">~6,107 rows</text>
  <line x1="40" y1="424" x2="220" y2="424" stroke="#085041" stroke-width="0.5" opacity="0.3"/>
  <text x="42" y="444" font-family="sans-serif" font-size="12" fill="#0F6E56">vessel_id (PK)</text>
  <text x="42" y="464" font-family="sans-serif" font-size="12" fill="#0F6E56">country</text>
  <text x="42" y="484" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_code (FK)</text>
  <text x="42" y="504" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_name</text>
  <text x="42" y="524" font-family="sans-serif" font-size="12" fill="#0F6E56">shiptype_category</text>

  <!-- fact table (central, highlighted) -->
  <rect x="270" y="230" width="220" height="200" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="380" y="256" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">fact_piraeus_activity_daily</text>
  <text x="380" y="274" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">~17,000 rows</text>
  <line x1="280" y1="286" x2="480" y2="286" stroke="#633806" stroke-width="0.5" opacity="0.3"/>
  <text x="282" y="306" font-family="sans-serif" font-size="12" fill="#633806">event_date (FK)</text>
  <text x="282" y="326" font-family="sans-serif" font-size="12" fill="#633806">shiptype_category (FK)</text>
  <text x="282" y="346" font-family="sans-serif" font-size="12" fill="#633806">zone</text>
  <text x="282" y="366" font-family="sans-serif" font-size="12" fill="#633806">distinct_vessels</text>
  <text x="282" y="386" font-family="sans-serif" font-size="12" fill="#633806">ping_count</text>
  <text x="282" y="406" font-family="sans-serif" font-size="12" fill="#633806">distinct_countries</text>
  <text x="282" y="424" font-family="sans-serif" font-size="12" fill="#633806">avg_speed</text>

  <!-- arrows -->
  <line x1="230" y1="150" x2="270" y2="280" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="490" y1="110" x2="490" y2="260" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="230" y1="450" x2="270" y2="380" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
